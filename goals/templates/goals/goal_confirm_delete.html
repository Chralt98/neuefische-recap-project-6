{% extends "base.html" %}

{% block title %}Delete goal — Learning Companion{% endblock %}

{% block content %}
  <div class="page-intro">
    <h1>Delete "{{ goal.title }}"?</h1>
  </div>

  <div class="card">
    <p>This will also delete all of its logged sessions.</p>
    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn">Delete goal</button>
    </form>
  </div>
  <p class="form-footer"><a href="{% url 'goal-detail' goal.pk %}">← Cancel</a></p>
{% endblock %}
